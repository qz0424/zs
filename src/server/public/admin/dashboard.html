<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.admin-layout{display:flex;min-height:100vh}
.admin-sidebar{width:220px;background:var(--primary);color:#fff;padding-top:0;flex-shrink:0;display:flex;flex-direction:column}
.admin-sidebar .logo{padding:20px;font-weight:bold;font-size:18px;font-family:var(--font-heading);border-bottom:1px solid rgba(255,255,255,.1)}
.admin-sidebar nav{flex:1;padding:8px 0}
.admin-sidebar a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;transition:all .2s;border-left:3px solid transparent}
.admin-sidebar a:hover,.admin-sidebar a.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--accent)}
.admin-sidebar .bottom-links{padding:12px 0;border-top:1px solid rgba(255,255,255,.1)}
.admin-main{flex:1;padding:24px;overflow-x:auto;background:#f8f7f4}
.admin-main h2{font-family:var(--font-heading);font-size:22px;margin-bottom:20px;color:var(--text)}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
.stat-card .label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.stat-card .value{font-size:24px;font-weight:700;color:var(--primary)}
.admin-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.admin-card h3{font-size:16px;margin-bottom:12px;color:var(--text)}
.admin-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.admin-table th,.admin-table td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.admin-table th{background:var(--bg);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary)}
.admin-table td{vertical-align:middle}
.admin-form label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.admin-form input,.admin-form select,.admin-form textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .2s;background:var(--bg)}
.admin-form input:focus,.admin-form select:focus,.admin-form textarea:focus{border-color:var(--accent)}
.admin-form textarea{min-height:80px;resize:vertical}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;z-index:200;padding:20px;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:28px;width:680px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);margin-top:20px}
.modal h3{font-family:var(--font-heading);font-size:20px;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-secondary);font-size:13px}
.upload-zone:hover{border-color:var(--accent);background:rgba(196,149,106,.05)}
.upload-zone input[type=file]{display:none}
.upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.upload-preview .thumb{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid var(--border)}
.upload-preview .thumb img,.upload-preview .thumb video{width:100%;height:100%;object-fit:cover}
.upload-preview .thumb .remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.color-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.color-row input[type=color]{width:36px;height:36px;border:none;border-radius:6px;cursor:pointer;padding:0}
.color-row input[type=text]{flex:1}
.color-row .thumb{width:40px;height:40px;border-radius:6px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
.color-row .thumb img{width:100%;height:100%;object-fit:cover}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;color:var(--text-secondary);transition:color .2s}
.btn-icon:hover{color:#E74C3C}
.history-list{max-height:400px;overflow-y:auto}
.history-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item .time{color:var(--text-secondary);font-size:12px;white-space:nowrap}
.history-item .action{flex:1}
.history-item .restore{color:var(--accent);cursor:pointer;font-weight:500;white-space:nowrap}
.history-item .restore:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:#E8F5E9;color:#2E7D32}
.badge-red{background:#FFEBEE;color:#C62828}
.badge-orange{background:#FFF3E0;color:#E65100}
.btn-warning{background:#FFF8E1;color:#F57F17;border-color:#FFE082}.btn-warning:hover{background:#FFECB3}
</style>
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar">
    <div class="logo">窗帘管理</div>
    <nav>
      <a href="#" class="active" onclick="return switchTab('products')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        款式管理
      </a>
      <a href="#" onclick="return switchTab('categories')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        分类管理
      </a>
      <a href="#" onclick="return switchTab('import')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        批量导入
      </a>
      <a href="#" onclick="return switchTab('pricetiers')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        价格档位
      </a>
      <a href="#" onclick="return switchTab('recycle')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        回收站
      </a>
      <a href="#" onclick="return switchTab('history')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        操作记录
      </a>
      <a href="#" onclick="return switchTab('orders')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        订单管理
      </a>
      <a href="#" onclick="return switchTab('settings')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </a>
    </nav>
    <div class="bottom-links">
      <a href="http://localhost:3000/client/" style="color:rgba(255,255,255,.6)">← 返回客户版</a>
      <a href="#" onclick="logout()" style="color:#E74C3C">退出登录</a>
    </div>
  </div>
  <div class="admin-main" id="adminMain"></div>
</div>

<!-- Edit Form Modal -->
<div id="formModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideForm()">
  <div class="modal">
    <h3 id="formTitle">新增款式</h3>
    <div class="admin-form" id="productForm">
      <div class="form-row">
        <div><label>款式名称 *</label><input id="f_name" /></div>
        <div><label>尺寸范围</label><input id="f_size" placeholder="如: 1.5-3米" /></div>
      </div>
      <div class="form-row">
        <div><label>分类</label><select id="f_category"></select></div>
        <div><label>材质</label><select id="f_material"></select></div>
      </div>
      <div class="form-row">
        <div><label>风格</label><select id="f_style"></select></div>
        <div><label>适用空间</label><select id="f_space"></select></div>
      </div>
      <div class="form-row">
        <div><label>遮光等级</label><select id="f_light"></select></div>
        <div><label>价格档位</label><select id="f_tier_id"><option value="">请选择</option></select></div>
      </div>
      <label>描述</label><textarea id="f_desc"></textarea>

      <!-- Media Upload -->
      <label style="margin-top:8px">图片 / 视频</label>
      <div class="upload-zone" id="mediaUploadZone" onclick="document.getElementById('mediaFileInput').click()">
        <input type="file" id="mediaFileInput" accept="image/*,video/*" multiple onchange="handleMediaUpload(event)" />
        点击或拖拽上传图片/视频（支持 JPG、PNG、MP4、WebM）
      </div>
      <div class="upload-preview" id="mediaPreview"></div>

      <!-- Colors -->
      <label style="margin-top:16px">颜色方案</label>
      <div id="colorList"></div>
      <button class="btn btn-sm btn-outline" onclick="addColorRow()" style="margin-top:8px">+ 添加颜色</button>

      <div style="margin-top:20px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveProduct()">保存</button>
        <button class="btn btn-outline" onclick="hideForm()">取消</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let editingId = null;
let allCategories = {};
let formMedia = [];
let formColors = [];

if (!API.token) { window.location.href = 'login.html'; }

function getAdminToken() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (urlToken && urlToken !== localStorage.getItem('token')) {
    localStorage.setItem('token', urlToken);
  }
  return localStorage.getItem('token');
}
const adminToken = getAdminToken();
if (!adminToken) { window.location.href = 'login.html'; }

function logout() { localStorage.removeItem('token'); window.location.href = 'login.html'; }

function switchTab(name) {
  document.querySelectorAll('.admin-sidebar nav a').forEach(a => a.classList.remove('active'));
  event.target.closest('a').classList.add('active');
  if (name === 'products') renderProductsTab();
  else if (name === 'categories') renderCategoriesTab();
  else if (name === 'import') renderImportTab();
  else if (name === 'pricetiers') renderPriceTiersTab();
  else if (name === 'recycle') renderRecycleTab();
  else if (name === 'history') renderHistoryTab();
  else if (name === 'orders') renderOrdersTab();
  else if (name === 'settings') renderSettingsTab();
  return false;
}

async function loadCategorySelects() {
  allCategories = await API.getCategories();
  const map = { f_category:'category', f_material:'material', f_style:'style', f_space:'space', f_light:'light' };
  for (const [selId, dim] of Object.entries(map)) {
    const el = document.getElementById(selId);
    const items = allCategories[dim] || [];
    el.innerHTML = '<option value="">请选择</option>' + items.map(it => `<option value="${it.id}">${it.name}</option>`).join('');
  }
}

// ====== Products Tab ======
async function renderProductsTab() {
  const main = document.getElementById('adminMain');
  main.innerHTML = `<h2>款式管理</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn btn-primary" onclick="showForm()">+ 新增款式</button>
      <button class="btn btn-outline" onclick="showBatchAssign()">批量设置档位</button>
    </div>
    <div style="margin-top:4px;overflow-x:auto">
      <table class="admin-table"><thead><tr><th style="width:36px"><input type="checkbox" id="selectAllProducts" onchange="toggleSelectAll()" /></th><th>封面</th><th>名称</th><th>档位</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
      <tbody id="productBody"></tbody></table>
    </div>`;
  try {
    const list = await API.getCurtains();
    const body = document.getElementById('productBody');
    body.innerHTML = list.map(c => `<tr>
      <td><input type="checkbox" class="productCheck" value="${c.id}" /></td>
      <td><img src="${c.cover || '/assets/placeholder.svg'}" style="width:48px;height:36px;object-fit:cover;border-radius:4px" onerror="this.src='/assets/placeholder.svg'" /></td>
      <td style="font-weight:500">${c.name}</td>
      <td style="font-size:12px;color:var(--text-secondary)">${c.tier ? c.tier.name+' ('+c.tier.unit_price+'元/米)' : '-'}</td>
      <td><span class="badge ${c.status==='active'?'badge-green':'badge-red'}">${c.status==='active'?'上架':'下架'}</span></td>
      <td style="color:var(--text-secondary);font-size:12px">${c.created_at||''}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-outline" onclick="editProduct(${c.id})">编辑</button>
        <button class="btn btn-sm ${c.status==='active'?'btn-danger':'btn-primary'}" onclick="toggleStatus(${c.id},'${c.status==='active'?'inactive':'active'}')">${c.status==='active'?'下架':'上架'}</button>
        <button class="btn btn-sm btn-outline" style="color:#E74C3C;border-color:#E74C3C" onclick="deleteProduct(${c.id})">删除</button>
      </td>
    </tr>`).join('');
  } catch(e) { main.innerHTML += '<div style="color:red;margin-top:12px">加载失败</div>'; }
}

// ====== Form ======
function showForm(data) {
  editingId = data?.id || null;
  formColors = (data?.colors || []).map(c => ({ color_name: c.color_name, color_code: c.color_code || '#000000', image_url: c.media_url || null, _dbId: c.id }));
  if (formColors.length === 0) formColors.push({ color_name: '', color_code: '#000000', image_url: null });
  formMedia = (data?.media || []).map(m => {
    let colorIndex = null;
    if (m.color_id != null) {
      const idx = formColors.findIndex(c => c._dbId === m.color_id);
      colorIndex = idx >= 0 ? idx : null;
    }
    return { url: m.url, type: m.type, color_id: colorIndex };
  });

  document.getElementById('formTitle').textContent = editingId ? '编辑款式' : '新增款式';
  document.getElementById('f_name').value = data?.name || '';
  document.getElementById('f_size').value = data?.size_range || '';
  document.getElementById('f_desc').value = data?.description || '';
  document.getElementById('formModal').style.display = 'flex';
  loadCategorySelects().then(() => {
    if (data) {
      document.getElementById('f_category').value = data?.category_id || '';
      document.getElementById('f_material').value = data?.material_id || '';
      document.getElementById('f_style').value = data?.style_id || '';
      document.getElementById('f_space').value = data?.space_id || '';
      document.getElementById('f_light').value = data?.light_level_id || '';
      document.getElementById('f_tier_id').value = data?.tier_id || '';
    }
  });
  API.getPriceTiers().then(tiers => {
    const sel = document.getElementById('f_tier_id');
    sel.innerHTML = '<option value="">请选择</option>' + tiers.map(t => `<option value="${t.id}" ${data?.tier_id == t.id ? 'selected' : ''}>${t.name} (${t.unit_price}元/米)</option>`).join('');
  }).catch(() => {});
  renderMediaPreview();
  renderColorList();
}

function hideForm() { document.getElementById('formModal').style.display = 'none'; editingId = null; }

async function handleMediaUpload(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    try {
      const res = await API.uploadFile(file);
      formMedia.push({ url: res.url, type: res.type, color_id: null });
    } catch(err) { toast('上传失败: ' + err.message); }
  }
  renderMediaPreview();
  e.target.value = '';
}

function renderMediaPreview() {
  const el = document.getElementById('mediaPreview');
  el.innerHTML = formMedia.map((m, i) => `<div class="thumb">
    ${m.type==='video' ? `<video src="${m.url}"></video>` : `<img src="${m.url}" />`}
    <button class="remove" onclick="formMedia.splice(${i},1);renderMediaPreview()">×</button>
  </div>`).join('');
}

function addColorRow() {
  formColors.push({ color_name: '', color_code: '#000000', image_url: null });
  renderColorList();
}

function removeColorRow(i) {
  formColors.splice(i, 1);
  renderColorList();
}

function renderColorList() {
  const el = document.getElementById('colorList');
  el.innerHTML = formColors.map((c, i) => `<div class="color-row">
    <input type="color" value="${c.color_code}" onchange="formColors[${i}].color_code=this.value" />
    <input type="text" value="${c.color_name}" placeholder="颜色名称" onchange="formColors[${i}].color_name=this.value" style="flex:1" />
    <label style="margin:0;font-size:12px;cursor:pointer;color:var(--accent);white-space:nowrap">
      选择图片
      <input type="file" accept="image/*" style="display:none" onchange="uploadColorImage(${i}, this)" />
    </label>
    ${c.image_url ? `<div class="thumb"><img src="${c.image_url}" /></div>` : ''}
    <button class="btn-icon" onclick="removeColorRow(${i})" title="删除">✕</button>
  </div>`).join('');
}

async function uploadColorImage(idx, input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const res = await API.uploadFile(file);
    formColors[idx].image_url = res.url;
    renderColorList();
    toast('图片已上传');
  } catch(e) { toast('上传失败'); }
}

async function saveProduct() {
  const validColors = [];
  const colorIndexMap = {};
  formColors.forEach((c, i) => {
    if (c.color_name) {
      colorIndexMap[i] = validColors.length;
      validColors.push({ color_name: c.color_name, color_code: c.color_code });
    }
  });

  const mediaToSend = [];
  formMedia.forEach(m => {
    const newIdx = m.color_id != null ? (colorIndexMap[m.color_id] ?? null) : null;
    mediaToSend.push({ url: m.url, type: m.type, color_id: newIdx });
  });
  formColors.forEach((c, i) => {
    if (c.image_url && c.color_name && !mediaToSend.some(m => m.url === c.image_url)) {
      const newIdx = colorIndexMap[i];
      if (newIdx != null) mediaToSend.push({ url: c.image_url, type: 'image', color_id: newIdx });
    }
  });

  const data = {
    name: document.getElementById('f_name').value.trim(),
    category_id: document.getElementById('f_category').value || null,
    material_id: document.getElementById('f_material').value || null,
    style_id: document.getElementById('f_style').value || null,
    space_id: document.getElementById('f_space').value || null,
    light_level_id: document.getElementById('f_light').value || null,
    tier_id: document.getElementById('f_tier_id').value || null,
    size_range: document.getElementById('f_size').value.trim() || null,
    description: document.getElementById('f_desc').value.trim() || null,
    media: mediaToSend,
    colors: validColors
  };
  if (!data.name) { toast('请输入款式名称'); return; }

  try {
    await API.saveCurtain(data, editingId);
    hideForm();
    renderProductsTab();
    toast(editingId ? '已更新' : '已创建');
  } catch(e) { toast(e.message); }
}

async function editProduct(id) {
  try { const c = await API.getCurtain(id); showForm(c); } catch(e) { toast('加载失败'); }
}

async function toggleStatus(id, status) {
  const action = status === 'active' ? '上架' : '下架';
  if (!confirm(`确定${action}？`)) return;
  try {
    await API.setStatus(id, status);
    addHistory({ type: 'status', curtain_id: id, action, time: new Date().toLocaleString() });
    renderProductsTab();
    toast(`已${action}`);
  } catch(e) { toast('操作失败'); }
}

async function deleteProduct(id) {

function getHistory() { return JSON.parse(localStorage.getItem('adminHistory') || '[]'); }
function addHistory(record) {

  localStorage.setItem('adminHistory', JSON.stringify(h));
}

function renderHistoryTab() {
  const main = document.getElementById('adminMain');

  main.innerHTML = `<h2>操作记录</h2>

      ${h.length === 0 ? '<p style="color:var(--text-secondary)">暂无操作记录</p>' :
        `<div class="history-list">${h.map((r, i) => `<div class="history-item">
          <span class="badge ${r.type==='delete'?'badge-red':'badge-orange'}">${r.type==='delete'?'删除':'下架'}</span>
          <span class="action">${r.name || '款式#'+r.curtain_id}</span>
          <span class="time">${r.time}</span>
          ${r.type==='delete' && r.data ? `<span class="restore" onclick="restoreItem(${i})">恢复</span>` : ''}
        </div>`).join('')}</div>`}
    </div>`;
}

async function restoreItem(idx) {
  const h = getHistory();
  const record = h[idx];
  if (!record || !record.data) return;
  try {
    const d = record.data;
    const oldColors = d.colors || [];
    const colorIdToIndex = {};
    oldColors.forEach((c, i) => { colorIdToIndex[c.id] = i; });
    await API.saveCurtain({
      name: d.name, category_id: d.category_id, material_id: d.material_id,
      style_id: d.style_id, space_id: d.space_id, light_level_id: d.light_level_id,
      size_range: d.size_range, description: d.description,
      media: (d.media || []).map(m => ({ url: m.url, type: m.type, color_id: m.color_id != null ? (colorIdToIndex[m.color_id] ?? null) : null })),
      colors: (d.colors || []).map(c => ({ color_name: c.color_name, color_code: c.color_code }))
    });
    h.splice(idx, 1);
    localStorage.setItem('adminHistory', JSON.stringify(h));
    renderHistoryTab();
    toast('已恢复');
  } catch(e) { toast('恢复失败: ' + e.message); }
}

      <input type="file" id="csvFile" accept=".csv" style="margin-bottom:12px" />

      <div id="importResult" style="margin-top:12px"></div>
    </div>`;

async function importCSV() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) { toast('请选择CSV文件'); return; }
  const text = await file.text();
  const lines = text.trim().split('\n');
  if (lines.length < 2) { toast('数据为空'); return; }
  const headers = lines[0].split(',');
  const items = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(',');
    const item = {};
    headers.forEach((h, idx) => { item[h.trim()] = (vals[idx] || '').trim(); });
    if (item.name) items.push(item);
  }
  try {
    const res = await API.importBatch(items);
    document.getElementById('importResult').innerHTML = `<span style="color:#27AE60">成功导入 ${res.count} 条数据</span>`;
  } catch(e) {
    document.getElementById('importResult').innerHTML = `<span style="color:#E74C3C">导入失败: ${e.message}</span>`;
  }
}

function toast(msg) {
  let el = document.querySelector('.toast');
  if (!el) { el = document.createElement('div'); el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

        <label>微信号</label><input id="set_wechat" placeholder="微信号" />
        <label>二维码图片URL</label><input id="set_qrcode" placeholder="微信/支付宝收款码图片链接" />
        <label>企业微信/钉钉 Webhook</label><input id="set_webhook" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx" />
      </div>
      <h3 style="margin-top:20px">小区列表</h3>
      <div id="communityList" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <input id="newCommunity" placeholder="输入小区名称" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px" />
        <button class="btn btn-sm btn-primary" onclick="addCommunity()">添加</button>
      </div>
      <div style="margin-top:20px">
        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      </div>
    </div>`;
  loadSettings();
}

async function loadSettings() {
  try {
    const res = await API.getSettings();
    const map = {};
    (res.settings || []).forEach(s => { map[s.key] = s.value; });
    document.getElementById('set_phone').value = map.phone || '';
    document.getElementById('set_wechat').value = map.wechat || '';
    document.getElementById('set_qrcode').value = map.qrcode_url || '';
    document.getElementById('set_webhook').value = map.webhook_url || '';
    renderCommunities(JSON.parse(map.communities || '[]'));
  } catch(e) {}
}

function renderCommunities(list) {
  const el = document.getElementById('communityList');
  if (!el) return;
  el.innerHTML = list.map((c, i) => `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;margin:0 6px 6px 0;font-size:13px">${c} <button onclick="removeCommunity(${i})" style="background:none;border:none;color:#E74C3C;cursor:pointer;font-size:14px">×</button></span>`).join('');
}

let communitiesCache = [];

async function addCommunity() {
  const input = document.getElementById('newCommunity');
  const name = input.value.trim();
  if (!name) return;
  const res = await API.getSettings();
  const map = {};
  (res.settings || []).forEach(s => { map[s.key] = s.value; });
  const list = JSON.parse(map.communities || '[]');
  if (list.includes(name)) { toast('已存在'); return; }
  list.push(name);
  await API.saveSettings({ communities: JSON.stringify(list) });
  input.value = '';
  renderCommunities(list);
  toast('已添加');
}

async function removeCommunity(idx) {
  const res = await API.getSettings();
  const map = {};
  (res.settings || []).forEach(s => { map[s.key] = s.value; });
  const list = JSON.parse(map.communities || '[]');
  list.splice(idx, 1);
  await API.saveSettings({ communities: JSON.stringify(list) });
  renderCommunities(list);
}

async function saveSettings() {
  try {
    await API.saveSettings({
      phone: document.getElementById('set_phone').value,
      wechat: document.getElementById('set_wechat').value,
      qrcode_url: document.getElementById('set_qrcode').value,
      webhook_url: document.getElementById('set_webhook').value
    });
    toast('设置已保存');
  } catch(e) {
    toast('保存失败: ' + e.message);
  }
}

// Init
renderProductsTab();
</script>
</body>
</html>
