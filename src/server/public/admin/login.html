<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>管理员登录</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h2>管理员登录</h2>
    <input type="text" id="username" placeholder="用户名" autocomplete="username" />
    <input type="password" id="password" placeholder="密码" autocomplete="current-password" />
    <button onclick="login()">登录</button>
    <div class="error" id="error"></div>
    <div style="text-align:center;margin-top:16px;font-size:13px">
      <a href="register.html" style="color:var(--accent);text-decoration:none">注册新账号</a>
      <span style="color:var(--border);margin:0 8px">|</span>
      <a href="/client/" style="color:var(--text-secondary);text-decoration:none">返回首页</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
(async function() {
  const t = localStorage.getItem('token');
  if (t) {
    try {
      if (typeof API === 'undefined') { localStorage.removeItem('token'); return; }
      await API.get('/api/settings');
      window.location.href = 'dashboard.html?token=' + t;
    } catch(e) {
      localStorage.removeItem('token');
    }
  }
})();

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { document.getElementById('error').textContent = '请输入用户名和密码'; return; }
  try {
    const res = await API.login(username, password);
    localStorage.setItem('token', res.token);
    window.location.href = 'dashboard.html?token=' + res.token;
  } catch(e) {
    document.getElementById('error').textContent = e.message;
  }
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
