<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>产品展示</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2C3E50">
<style>
.price{font-size:18px;font-weight:700;color:var(--accent,#c4956a);margin:4px 0}.price-unit{font-size:12px;font-weight:400;color:var(--text-secondary);margin-left:2px}
.detail-price-value{font-size:28px;font-weight:700;color:var(--accent,#c4956a)}.detail-price-unit{font-size:14px;color:var(--text-secondary);margin-left:4px}.detail-price-desc{display:block;font-size:13px;color:var(--text-secondary);margin-top:2px}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <span class="back" id="backBtn" style="display:none">←</span>
    <h1 id="pageTitle" style="flex:1">产品展示</h1>
  </div>

  <!-- Search -->
  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="搜索款式名称..." />
    <button onclick="searchCurtains()">搜索</button>
  </div>

  <!-- Filters -->
  <div class="filters" id="filterBar">
    <select id="filterAll" onchange="filterByDim('all', this.value)"><option value="">全部</option></select>
    <div class="filter-group"><span class="filter-label">分类</span><select id="filterCategory" onchange="filterByDim('category', this.value)"><option value="">不限</option></select></div>
    <div class="filter-group"><span class="filter-label">材质</span><select id="filterMaterial" onchange="filterByDim('material', this.value)"><option value="">不限</option></select></div>
    <div class="filter-group"><span class="filter-label">风格</span><select id="filterStyle" onchange="filterByDim('style', this.value)"><option value="">不限</option></select></div>
    <div class="filter-group"><span class="filter-label">空间</span><select id="filterSpace" onchange="filterByDim('space', this.value)"><option value="">不限</option></select></div>
    <div class="filter-group"><span class="filter-label">价格</span><select id="filterTier" onchange="filterByTier(this.value)"><option value="">不限</option></select></div>
  </div>

  <!-- Page: Home -->
  <div class="page" id="page-home">
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        最近浏览
      </div>
      <div class="history-grid" id="historyGrid"></div>
    </div>
    <div class="product-grid" id="productGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <p>暂无产品</p>
    </div>
  </div>

  <!-- Page: Detail -->
  <div class="page hidden" id="page-detail">
    <div class="detail">
      <div class="media-section">
        <div id="mainMedia"></div>
        <div class="media-nav" id="mediaNav"></div>
      </div>
      <div class="body">
        <h2 id="detailName"></h2>
        <div id="detailPrice" style="margin-bottom:12px"></div>
        <div class="tags" id="detailTags"></div>
        <div class="colors-list" id="detailColors"></div>
        <div class="fav-large" id="detailFav"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> <span id="detailFavText">收藏</span></div>
      </div>
    </div>
  </div>

  <!-- Page: Favorites -->
  <div class="page hidden" id="page-favorites">
    <div class="fav-toolbar">
      <button class="btn btn-sm btn-outline" onclick="showNewCollectionPrompt()">+ 新建</button>
      <select id="favCollectionFilter" onchange="onCollectionChange()" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--bg);color:var(--text)"></select>
      <button class="btn btn-sm btn-outline" id="favRenameBtn" style="display:none" onclick="renameCurrentCollection()">重命名</button>
      <button class="btn btn-sm btn-outline" id="favDeleteBtn" style="display:none;color:#c0392b;border-color:#c0392b" onclick="deleteCurrentCollection()">删除</button>
    </div>
    <div class="product-grid" id="favGrid"></div>
    <div class="empty-state" id="favEmpty" style="display:none">
      <div class="icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <p>还没有收藏的款式</p>
    </div>
  </div>

  <!-- Page: Compare -->
  <div class="page hidden" id="page-compare">
    <div class="compare-grid" id="compareGrid"></div>
    <div class="empty-state" id="compareEmpty" style="display:none">
      <div class="icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
      </div>
      <p>还没有添加对比</p>
    </div>
  </div>

  <!-- Page: Order -->
  <div class="page hidden" id="page-order">
    <div class="order-form">
      <h3 class="section-title">📍 地址信息</h3>
      <div class="form-group">
        <label>小区名称 *</label>
        <input id="orderCommunity" placeholder="请输入小区名称" />
        <div class="form-input-row" style="margin-top:6px">
          <input id="orderBuilding" placeholder="号楼" />
          <input id="orderUnit" placeholder="单元" />
        </div>
        <div class="form-input-row">
          <input id="orderRoom" placeholder="房间号 (如 1201)" />
        </div>
      </div>
      <div class="form-group">
        <label>补充说明</label>
        <input id="orderAddressNote" placeholder="如: 门禁密码、楼层指引等" />
      </div>
      <div class="form-group">
        <label>联系电话 *</label>
        <input id="orderPhone" type="tel" placeholder="手机号" maxlength="11" />
      </div>

      <h3 class="section-title" style="margin-top:20px">🪟 窗帘方案</h3>
      <div id="orderItems"></div>
      <button class="btn btn-outline" style="width:100%;margin-top:10px" onclick="addOrderItem()">+ 添加一组窗帘</button>

      <h3 class="section-title" style="margin-top:20px">备注</h3>
      <textarea id="orderNote" rows="2" placeholder="其他说明 (可选)"></textarea>

      <div class="order-preview" id="orderPreview" style="display:none">
        <div class="preview-title">预览</div>
        <div id="orderPreviewContent"></div>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:14px" onclick="submitOrder()">提交订单</button>
    </div>
  </div>

  <!-- Compare Bar -->
  <div class="compare-bar" id="compareBar" style="display:none">
    <span id="compareCount">0 款</span>
    <button class="btn btn-sm btn-primary" onclick="showPage('compare')">对比</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="active" onclick="return showPage('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </a>
    <a href="#" onclick="return showPage('favorites')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>收藏</span>
    </a>
    <a href="#" onclick="return showPage('compare')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
      <span>对比</span>
    </a>
    <a href="#" onclick="return showPage('order')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <span>下单</span>
    </a>
  </nav>
</div>

<script src="/js/api.js"></script>
<script>
let allCurtains = [];
let categories = {};
let compareIds = JSON.parse(localStorage.getItem('compareIds') || '[]');
let favIds = new Set();
let currentDetail = null;
let selectedColorId = null;

function getHistory() { return JSON.parse(localStorage.getItem('browseHistory') || '[]'); }

function recordHistory(id) {
  let h = getHistory();
  h = h.filter(i => i !== id);
  h.unshift(id);
  if (h.length > 50) h = h.slice(0, 50);
  localStorage.setItem('browseHistory', JSON.stringify(h));
}

function renderHistory() {
  const ids = getHistory();
  const container = document.getElementById('historySection');
  if (ids.length === 0) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  const grid = document.getElementById('historyGrid');
  const items = ids.map(id => allCurtains.find(c => c.id === id)).filter(Boolean).slice(0, 10);
  if (items.length === 0) { container.style.display = 'none'; return; }
  grid.innerHTML = items.map(c => {
    const col = (c.colors || [])[0];
    return `<div class="history-item" onclick="openDetail(${c.id})">
      <img src="${col?.media_url || c.cover || '/assets/placeholder.svg'}" onerror="this.src='/assets/placeholder.svg'" />
      <div class="name">${c.name}</div>
    </div>`;
  }).join('');
}

async function loadCategories() {
  try {
    categories = await API.getCategories();
    renderFilters();
  } catch(e) {}
  try {
    const tiers = await API.getEnabledTiers();
    const sel = document.getElementById('filterTier');
    sel.innerHTML = '<option value="">不限</option>' + tiers.map(t => `<option value="${t.id}">${t.name} (¥${t.unit_price}/米)</option>`).join('');
  } catch(e) {}
}

function renderFilters() {
  const map = { category: 'filterCategory', material: 'filterMaterial', style: 'filterStyle', space: 'filterSpace' };
  Object.keys(map).forEach(dim => {
    const sel = document.getElementById(map[dim]);
    const items = categories[dim] || [];
    sel.innerHTML = '<option value="">不限</option>'
      + items.map(item => `<option value="${item.id}">${item.name}</option>`).join('');
  });
}

let orderItemCount = 0;
let orderItems = [];
const roomTypes = ['客厅', '主卧', '次卧', '儿童房', '书房', '餐厅', '阳台', '飘窗', '榻榻米', '玄关', '其他'];

function initOrderPage() {
  if (orderItems.length === 0) addOrderItem();
}

function addOrderItem() {
  const id = orderItemCount++;
  orderItems.push(id);
  const div = document.createElement('div');
  div.className = 'order-item';
  div.id = 'order-item-' + id;
  div.innerHTML = `
    <div class="order-item-header">
      <span id="oi-title-${id}">窗帘 #${orderItems.length}</span>
      <button class="btn btn-sm btn-danger" onclick="removeOrderItem(${id})">删除</button>
    </div>
    <div class="form-group">
      <label>房间类型 *</label>
      <div class="room-type-grid" id="oi-room-${id}">
        ${roomTypes.map((r, i) => `<div class="room-type-btn${i === 0 ? ' active' : ''}" onclick="selectRoom(${id}, ${i})" data-index="${i}">${r}</div>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label>选择窗帘 *</label>
      <select id="oi-curtain-${id}" onchange="onOrderCurtainChange(${id})">
        <option value="">请选择</option>
        ${allCurtains.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>选择颜色</label>
      <div class="color-picker" id="oi-colors-${id}"><span style="color:var(--text-secondary);font-size:13px">请先选窗帘</span></div>
    </div>
    <div class="form-input-row">
      <div class="form-group" style="flex:1"><label>宽度 (cm)</label><input id="oi-w-${id}" type="number" placeholder="窗宽" /></div>
      <div class="form-group" style="flex:1"><label>高度 (cm)</label><input id="oi-h-${id}" type="number" placeholder="窗高" /></div>
    </div>
  `;
  document.getElementById('orderItems').appendChild(div);
}

function selectRoom(itemId, roomIndex) {
  const grid = document.getElementById('oi-room-' + itemId);
  grid.querySelectorAll('.room-type-btn').forEach(b => b.classList.remove('active'));
  grid.querySelector(`[data-index="${roomIndex}"]`).classList.add('active');
  const title = document.getElementById('oi-title-' + itemId);
  if (title) title.textContent = roomTypes[roomIndex];
}

function removeOrderItem(id) {
  orderItems = orderItems.filter(i => i !== id);
  const el = document.getElementById('order-item-' + id);
  if (el) el.remove();
  document.querySelectorAll('#orderItems .order-item-header span[id^="oi-title-"]').forEach((span, i) => {
    span.textContent = '窗帘 #' + (i + 1);
  });
}

function onOrderCurtainChange(id) {
  const curtainId = +document.getElementById('oi-curtain-' + id).value;
  const container = document.getElementById('oi-colors-' + id);
  if (!curtainId) { container.innerHTML = '<span style="color:var(--text-secondary);font-size:13px">请先选窗帘</span>'; return; }
  API.getCurtain(curtainId).then(c => {
    if (!c.colors || c.colors.length === 0) {
      container.innerHTML = '<span style="color:var(--text-secondary);font-size:13px">暂无颜色可选</span>';
      return;
    }
    container.innerHTML = c.colors.map((col, i) => {
      const colorVal = col.color_code || '#ccc';
      return `<div class="color-option${i === 0 ? ' active' : ''}" onclick="orderSelectColor(${id}, ${i}, ${col.id})" data-index="${i}" data-color-id="${col.id}">
        <span class="color-dot" style="background:${colorVal}"></span>
        <span class="color-name">${col.color_name || '颜色' + (i+1)}</span>
      </div>`;
    }).join('');
  });
}

function orderSelectColor(itemId, colorIndex, colorId) {
  const container = document.getElementById('oi-colors-' + itemId);
  container.querySelectorAll('.color-option').forEach(b => b.classList.remove('active'));
  container.querySelector(`[data-index="${colorIndex}"]`).classList.add('active');
}

function getColorId(itemId) {
  const active = document.querySelector('#oi-colors-' + itemId + ' .color-option.active');
  return active ? +active.dataset.colorId : null;
}

function buildOrderPayload() {
  const items = [];
  document.querySelectorAll('#orderItems .order-item').forEach(el => {
    const id = el.id.split('-')[2];
    const curtainId = +document.getElementById('oi-curtain-' + id).value;
    if (!curtainId) return;
    const roomGrid = document.getElementById('oi-room-' + id);
    const activeRoom = roomGrid.querySelector('.room-type-btn.active');
    const roomType = activeRoom ? roomTypes[+activeRoom.dataset.index] : '';
    items.push({
      space: roomType,
      curtain_id: curtainId,
      color_id: getColorId(id),
      width: +document.getElementById('oi-w-' + id).value || null,
      height: +document.getElementById('oi-h-' + id).value || null
    });
  });
  return {
    customer_phone: document.getElementById('orderPhone').value,
    community: document.getElementById('orderCommunity').value,
    building: document.getElementById('orderBuilding').value,
    unit: document.getElementById('orderUnit').value,
    room: document.getElementById('orderRoom').value,
    address_detail: document.getElementById('orderAddressNote').value,
    items,
    note: document.getElementById('orderNote').value
  };
}

async function submitOrder() {
  const data = buildOrderPayload();
  if (!data.community) return alert('请填写小区名称');
  if (!data.room) return alert('请填写房间号');
  if (!data.customer_phone || !/^1\d{10}$/.test(data.customer_phone)) return alert('请输入正确的手机号');
  if (data.items.length === 0) return alert('请至少添加一组窗帘');
  try {
    const res = await API.submitOrder(data);
    alert('下单成功！订单号: ' + res.order_no);
    showPage('home');
  } catch(e) {
    alert(e.message || '下单失败');
  }
}

let activeFilters = {};

function filterByDim(dim, val) {
  if (dim === 'all') {
    activeFilters = {};
    ['filterCategory', 'filterMaterial', 'filterStyle', 'filterSpace', 'filterTier'].forEach(id => document.getElementById(id).value = '');
  } else {
    document.getElementById('filterAll').value = '';
    if (val) activeFilters[dim] = val;
    else delete activeFilters[dim];
  }
  loadCurtains();
}

function filterByTier(val) {
  document.getElementById('filterAll').value = '';
  if (val) activeFilters['tier_id'] = val;
  else delete activeFilters['tier_id'];
  loadCurtains();
}

function searchCurtains() {
  loadCurtains();
}

async function loadCurtains() {
  const params = {};
  const q = document.getElementById('searchInput').value.trim();
  if (q) params.search = q;
  Object.keys(activeFilters).forEach(dim => { params[dim] = activeFilters[dim]; });

  try {
    allCurtains = await API.getCurtains(params);
    renderGrid(document.getElementById('productGrid'), document.getElementById('emptyState'), allCurtains);
    renderHistory();
  } catch(e) {
    document.getElementById('productGrid').innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

function renderGrid(grid, empty, items) {
  if (!items || items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = items.map(c => {
    const isFav = favIds.has(c.id);
    const hasCompare = compareIds.includes(c.id);
    const cardColors = c.colors || [];
    return `<div class="product-card" style="position:relative">
      <div onclick="openDetail(${c.id})" style="cursor:pointer">
        <button class="fav-btn" onclick="event.stopPropagation(); toggleFav(${c.id}, ${!isFav})">${isFav ? '<svg viewBox="0 0 24 24" fill="#E74C3C" stroke="#E74C3C" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'}</button>
        <img class="card-cover" data-curtain="${c.id}" src="${c.cover || '/assets/placeholder.svg'}" alt="${c.name}" onerror="this.src='/assets/placeholder.svg'" />
      </div>
      <div class="info">
        <div class="name" onclick="openDetail(${c.id})">${c.name}</div>
        <div class="meta">${c.size_range || ''}</div>
        ${c.tier ? `<div class="price">¥${c.tier.unit_price}<span class="price-unit">/米</span></div>` : ''}
        <div class="colors">${cardColors.map(col => `<span class="color-dot" data-cid="${c.id}" data-url="${col.media_url || c.cover || '/assets/placeholder.svg'}" data-name="${col.color_name}" data-code="${col.color_code || '#ddd'}" style="background:${col.color_code || '#ddd'}" onclick="event.stopPropagation(); previewColor(this, ${c.id})"></span>`).join('')}</div>
        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); toggleCompare(${c.id})" style="margin-top:6px;width:100%">
          ${hasCompare ? '取消对比' : '加入对比'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function previewColor(el, curtainId) {
  const card = el.closest('.product-card');
  if (!card) return;
  const cover = card.querySelector('.card-cover');
  if (cover) {
    cover.src = el.dataset.url;
  }
}

function selectColor(colorId) {
  selectedColorId = colorId;
  if (!currentDetail) return;
  const filtered = (currentDetail.media || []).filter(m => Number(m.color_id) === Number(colorId));
  const medias = filtered.length > 0 ? filtered : (currentDetail.media || []);

  const mainMedia = document.getElementById('mainMedia');
  if (medias.length > 0) {
    showMainMedia({ tagName: 'IMG', src: medias[0].url, classList: { add: function(){} } });
  } else {
    mainMedia.innerHTML = `<div style="width:100%;height:300px;background:#eee;display:flex;align-items:center;justify-content:center;color:#999;">暂无图片</div>`;
  }

  const nav = document.getElementById('mediaNav');
  nav.innerHTML = medias.map((m, i) => {
    if (m.type === 'video') {
      return `<video src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}"></video>`;
    }
    return `<img src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}" onerror="this.src='/assets/placeholder.svg'" />`;
  }).join('');

  document.querySelectorAll('.color-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.colorId) === Number(colorId));
  });
}

function showMainMedia(el) {
  const main = document.getElementById('mainMedia');
  const src = el.src || el.url;
  if (el.tagName === 'VIDEO') {
    main.innerHTML = `<video src="${src}" controls style="width:100%;max-height:400px"></video>`;
  } else {
    main.innerHTML = `<img src="${src}" onerror="this.src='/assets/placeholder.svg'" />`;
  }
  document.querySelectorAll('#mediaNav img, #mediaNav video').forEach(e => e.classList.remove('active'));
  if (el.classList) el.classList.add('active');
}

async function openDetail(id) {
  try {
    recordHistory(id);
    currentDetail = await API.getCurtain(id);
    const c = currentDetail;
    selectedColorId = null;
    document.getElementById('pageTitle').textContent = c.name;
    document.getElementById('backBtn').style.display = 'inline';

    const medias = c.media || [];
    const mainMedia = document.getElementById('mainMedia');
    if (medias.length > 0) {
      showMainMedia({ tagName: 'IMG', src: medias[0].url, classList: { add: function(){} } });
    } else {
      mainMedia.innerHTML = `<img src="/assets/placeholder.svg" />`;
    }

    const nav = document.getElementById('mediaNav');
    nav.innerHTML = medias.map((m, i) => {
      if (m.type === 'video') {
        return `<video src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}"></video>`;
      }
      return `<img src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}" onerror="this.src='/assets/placeholder.svg'" />`;
    }).join('');

    document.getElementById('detailName').textContent = c.name;
    document.getElementById('detailPrice').innerHTML = c.tier ? `<span class="detail-price-value">¥${c.tier.unit_price}</span><span class="detail-price-unit">/米</span>${c.tier.description ? `<span class="detail-price-desc">${c.tier.description}</span>` : ''}` : '';
    const tags = [];
    if (c.category) tags.push(c.category.name);
    if (c.material) tags.push(c.material.name);
    if (c.style) tags.push(c.style.name);
    if (c.light_level) tags.push(c.light_level.name);
    if (c.space) tags.push(c.space.name);
    if (c.size_range) tags.push(c.size_range);
    document.getElementById('detailTags').innerHTML = tags.map(t => `<span>${t}</span>`).join('');

    const colors = c.colors || [];
    document.getElementById('detailColors').innerHTML = colors.map(col =>
      `<div class="color-item" data-color-id="${col.id}" onclick="selectColor(${col.id})"><div class="color-dot" style="background:${col.color_code || '#ddd'}"></div><span>${col.color_name}</span></div>`
    ).join('');

    const isFav = favIds.has(c.id);
    document.getElementById('detailFavText').textContent = isFav ? '已收藏' : '收藏';
    document.getElementById('detailFav').onclick = () => toggleFav(c.id, !isFav);

    currentDetailId = c.id;
    showPage('detail');
  } catch(e) { toast('加载失败'); }
}

let currentDetailId = null;

async function loadFavorites() {
  try {
    const collectionId = document.getElementById('favCollectionFilter').value || undefined;
    const params = collectionId ? { collection_id: collectionId } : {};
    const favs = await API.getFavorites(params);
    favIds = new Set(favs.map(f => f.id));
    renderGrid(document.getElementById('favGrid'), document.getElementById('favEmpty'), favs);
  } catch(e) {}
}

async function loadCollectionsForFilter() {
  try {
    const cols = await API.getCollections();
    const sel = document.getElementById('favCollectionFilter');
    const currentVal = sel.value;
    sel.innerHTML = '<option value="">全部收藏</option>' + cols.map(c => `<option value="${c.id}">${c.name} (${c.count})</option>`).join('');
    if (currentVal) sel.value = currentVal;
    updateCollectionButtons();
  } catch(e) {}
}

function updateCollectionButtons() {
  const val = document.getElementById('favCollectionFilter').value;
  document.getElementById('favRenameBtn').style.display = val ? 'inline-block' : 'none';
  document.getElementById('favDeleteBtn').style.display = val ? 'inline-block' : 'none';
}

function onCollectionChange() {
  updateCollectionButtons();
  loadFavorites();
}

function renameCurrentCollection() {
  const sel = document.getElementById('favCollectionFilter');
  const id = parseInt(sel.value);
  const text = sel.options[sel.selectedIndex].text;
  const name = text.replace(/ \(\d+\)$/, '');
  const newName = prompt('重命名收藏夹：', name);
  if (newName && newName.trim() && newName.trim() !== name) {
    API.renameCollection(id, newName.trim()).then(() => { loadCollectionsForFilter(); toast('已重命名'); }).catch(e => toast(e.message));
  }
}

function deleteCurrentCollection() {
  const sel = document.getElementById('favCollectionFilter');
  if (confirm('确定删除此收藏夹？收藏不会丢失。')) {
    API.deleteCollection(parseInt(sel.value)).then(() => { sel.value = ''; loadCollectionsForFilter(); loadFavorites(); toast('收藏夹已删除'); }).catch(e => toast(e.message));
  }
}

async function toggleFav(id, add) {
  try {
    const onFavPage = document.getElementById('page-favorites').classList.contains('hidden') === false;
    const collectionId = onFavPage && add ? (parseInt(document.getElementById('favCollectionFilter').value) || null) : null;
    await API.toggleFavorite(id, add, add ? collectionId : undefined);
    if (add) favIds.add(id); else favIds.delete(id);
    toast(add ? '已收藏' : '已取消收藏');
    if (document.getElementById('page-favorites').classList.contains('hidden') === false) { loadFavorites(); loadCollectionsForFilter(); }
    if (document.getElementById('page-detail').classList.contains('hidden') === false) {
      document.getElementById('detailFavText').textContent = add ? '已收藏' : '收藏';
    }
    loadCurtains();
  } catch(e) { toast('操作失败'); }
}

function toggleCompare(id) {
  const idx = compareIds.indexOf(id);
  if (idx > -1) {
    compareIds.splice(idx, 1);
  } else {
    if (compareIds.length >= 4) { toast('最多对比4款'); return; }
    compareIds.push(id);
  }
  localStorage.setItem('compareIds', JSON.stringify(compareIds));
  updateCompareBar();
  if (!document.getElementById('page-home').classList.contains('hidden')) loadCurtains();
  if (!document.getElementById('page-favorites').classList.contains('hidden')) loadFavorites();
  if (!document.getElementById('page-compare').classList.contains('hidden')) loadComparePage();
}

function updateCompareBar() {
  const bar = document.getElementById('compareBar');
  if (compareIds.length > 0) {
    bar.style.display = 'flex';
    document.getElementById('compareCount').textContent = compareIds.length + ' 款';
  } else {
    bar.style.display = 'none';
  }
}

async function loadComparePage() {
  if (compareIds.length === 0) {
    document.getElementById('compareGrid').innerHTML = '';
    document.getElementById('compareEmpty').style.display = 'block';
    return;
  }
  document.getElementById('compareEmpty').style.display = 'none';

  const items = [];
  for (const id of compareIds) {
    try {
      const c = await API.getCurtain(id);
      items.push(c);
    } catch(e) {}
  }

  document.getElementById('compareGrid').innerHTML = items.map(c => {
    const cover = (c.media || []).find(m => m.type === 'image');
    return `<div class="compare-item">
      <button class="remove" onclick="toggleCompare(${c.id})">×</button>
      <img src="${cover?.url || '/assets/placeholder.jpg'}" onerror="this.src='/assets/placeholder.jpg'" />
      <div class="info" style="padding:8px">
        <div style="font-weight:600;font-size:13px">${c.name}</div>
        <div style="font-size:12px;color:#999;margin-top:4px">${c.size_range || ''}</div>
        ${c.category ? `<div style="font-size:12px;color:#666">分类：${c.category.name}</div>` : ''}
        ${c.material ? `<div style="font-size:12px;color:#666">材质：${c.material.name}</div>` : ''}
        ${c.style ? `<div style="font-size:12px;color:#666">风格：${c.style.name}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('page-' + name).classList.remove('hidden');
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  const titles = { home: '产品展示', favorites: '收藏', compare: '对比', order: '在线下单' };
  document.getElementById('pageTitle').textContent = titles[name] || '产品展示';
  document.getElementById('backBtn').style.display = name === 'detail' ? 'inline' : 'none';
  document.getElementById('searchBar').style.display = name === 'home' ? 'flex' : 'none';
  document.getElementById('filterBar').style.display = name === 'home' ? 'flex' : 'none';
  document.querySelector('.compare-bar').style.display = name === 'home' && compareIds.length > 0 ? 'flex' : 'none';

  if (name === 'home') loadCurtains();
  if (name === 'favorites') loadFavorites();
  if (name === 'compare') loadComparePage();
  if (name === 'order') initOrderPage();
  return false;
}

document.getElementById('backBtn').onclick = () => {
  if (!document.getElementById('page-detail').classList.contains('hidden')) showPage('home');
};

function toast(msg) {
  let el = document.querySelector('.toast');
  if (!el) {
    el = document.createElement('div'); el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Init
loadCategories();
loadCurtains();
loadFavorites();
loadCollectionsForFilter();
updateCompareBar();
</script>
</body>
</html>
