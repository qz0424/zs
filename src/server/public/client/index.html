<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>产品展示</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2C3E50">
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <span class="back" id="backBtn" style="display:none">←</span>
    <h1 id="pageTitle" style="flex:1">产品展示</h1>
    <a href="http://localhost:3001" target="_blank" style="font-size:12px;color:var(--text-secondary);text-decoration:none;font-weight:500">管理后台</a>
  </div>

  <!-- Search -->
  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="搜索款式名称..." />
    <button onclick="searchCurtains()">搜索</button>
  </div>

  <!-- Filters -->
  <div class="filters" id="filterBar"></div>

  <!-- Page: Home -->
  <div class="page" id="page-home">
    <div class="product-grid" id="productGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <p>暂无产品</p>
    </div>
  </div>

  <!-- Page: Detail -->
  <div class="page hidden" id="page-detail">
    <div class="detail">
      <div class="media-section">
        <div id="mainMedia"></div>
        <div class="media-nav" id="mediaNav"></div>
      </div>
      <div class="body">
        <h2 id="detailName"></h2>
        <div class="tags" id="detailTags"></div>
        <div class="colors-list" id="detailColors"></div>
        <div class="fav-large" id="detailFav"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> <span id="detailFavText">收藏</span></div>
      </div>
    </div>
  </div>

  <!-- Page: Favorites -->
  <div class="page hidden" id="page-favorites">
    <div class="product-grid" id="favGrid"></div>
    <div class="empty-state" id="favEmpty" style="display:none">
      <div class="icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <p>还没有收藏的款式</p>
    </div>
  </div>

  <!-- Page: Compare -->
  <div class="page hidden" id="page-compare">
    <div class="compare-grid" id="compareGrid"></div>
    <div class="empty-state" id="compareEmpty" style="display:none">
      <div class="icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".4"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
      </div>
      <p>还没有添加对比</p>
    </div>
  </div>

  <!-- Compare Bar -->
  <div class="compare-bar" id="compareBar" style="display:none">
    <span id="compareCount">0 款</span>
    <button class="btn btn-sm btn-primary" onclick="showPage('compare')">对比</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="active" onclick="return showPage('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </a>
    <a href="#" onclick="return showPage('favorites')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>收藏</span>
    </a>
    <a href="#" onclick="return showPage('compare')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
      <span>对比</span>
    </a>
  </nav>
</div>

<script src="/js/api.js"></script>
<script>
let allCurtains = [];
let categories = {};
let compareIds = JSON.parse(localStorage.getItem('compareIds') || '[]');
let favIds = new Set();
let currentDetail = null;
let selectedColorId = null;

async function loadCategories() {
  try {
    categories = await API.getCategories();
    renderFilters();
  } catch(e) {}
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  const dims = { category: '分类', material: '材质', style: '风格', space: '空间' };
  let html = '<span class="filter-btn active" data-dim="all" data-val="" onclick="filterBy(this)">全部</span>';
  Object.keys(dims).forEach(dim => {
    const items = categories[dim] || [];
    items.forEach(item => {
      html += `<span class="filter-btn" data-dim="${dim}" data-val="${item.id}" onclick="filterBy(this)">${item.name}</span>`;
    });
  });
  bar.innerHTML = html;
}

let activeFilters = {};

function filterBy(el) {
  const dim = el.dataset.dim;
  const val = el.dataset.val;

  if (dim === 'all') {
    activeFilters = {};
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-dim="all"]').classList.add('active');
  } else {
    document.querySelector('.filter-btn[data-dim="all"]').classList.remove('active');
    if (activeFilters[dim] === val) {
      delete activeFilters[dim];
      el.classList.remove('active');
    } else {
      document.querySelectorAll(`.filter-btn[data-dim="${dim}"]`).forEach(b => b.classList.remove('active'));
      activeFilters[dim] = val;
      el.classList.add('active');
    }
  }
  loadCurtains();
}

function searchCurtains() {
  loadCurtains();
}

async function loadCurtains() {
  const params = {};
  const q = document.getElementById('searchInput').value.trim();
  if (q) params.search = q;
  Object.keys(activeFilters).forEach(dim => { params[dim] = activeFilters[dim]; });

  try {
    allCurtains = await API.getCurtains(params);
    renderGrid(document.getElementById('productGrid'), document.getElementById('emptyState'), allCurtains);
  } catch(e) {
    document.getElementById('productGrid').innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

function renderGrid(grid, empty, items) {
  if (!items || items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = items.map(c => {
    const isFav = favIds.has(c.id);
    const hasCompare = compareIds.includes(c.id);
    const cardColors = c.colors || [];
    return `<div class="product-card" style="position:relative">
      <div onclick="openDetail(${c.id})" style="cursor:pointer">
        <button class="fav-btn" onclick="event.stopPropagation(); toggleFav(${c.id}, ${!isFav})">${isFav ? '<svg viewBox="0 0 24 24" fill="#E74C3C" stroke="#E74C3C" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'}</button>
        <img class="card-cover" data-curtain="${c.id}" src="${c.cover || '/assets/placeholder.svg'}" alt="${c.name}" onerror="this.src='/assets/placeholder.svg'" />
      </div>
      <div class="info">
        <div class="name" onclick="openDetail(${c.id})">${c.name}</div>
        <div class="meta">${c.size_range || ''}</div>
        <div class="colors">${cardColors.map(col => `<span class="color-dot" data-cid="${c.id}" data-url="${col.media_url || c.cover || '/assets/placeholder.svg'}" data-name="${col.color_name}" data-code="${col.color_code || '#ddd'}" style="background:${col.color_code || '#ddd'}" onclick="event.stopPropagation(); previewColor(this, ${c.id})"></span>`).join('')}</div>
        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); toggleCompare(${c.id})" style="margin-top:6px;width:100%">
          ${hasCompare ? '取消对比' : '加入对比'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function previewColor(el, curtainId) {
  const card = el.closest('.product-card');
  if (!card) return;
  const cover = card.querySelector('.card-cover');
  if (cover) {
    cover.src = el.dataset.url;
  }
}

function selectColor(colorId) {
  selectedColorId = colorId;
  if (!currentDetail) return;
  const filtered = (currentDetail.media || []).filter(m => m.color_id === colorId);
  const medias = filtered.length > 0 ? filtered : (currentDetail.media || []);

  const mainMedia = document.getElementById('mainMedia');
  if (medias.length > 0) {
    mainMedia.innerHTML = `<img src="${medias[0].url}" onerror="this.src='/assets/placeholder.svg'" />`;
  } else {
    mainMedia.innerHTML = `<div style="width:100%;height:300px;background:#eee;display:flex;align-items:center;justify-content:center;color:#999;">暂无图片</div>`;
  }

  const nav = document.getElementById('mediaNav');
  nav.innerHTML = medias.map((m, i) => {
    if (m.type === 'video') {
      return `<video src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}"></video>`;
    }
    return `<img src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}" onerror="this.src='/assets/placeholder.svg'" />`;
  }).join('');

  document.querySelectorAll('.color-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.colorId) === colorId);
  });
}

function showMainMedia(el) {
  const main = document.getElementById('mainMedia');
  const src = el.src || el.url;
  if (el.tagName === 'VIDEO') {
    main.innerHTML = `<video src="${src}" controls style="width:100%;max-height:400px"></video>`;
  } else {
    main.innerHTML = `<img src="${src}" onerror="this.src='/assets/placeholder.svg'" />`;
  }
  document.querySelectorAll('#mediaNav img, #mediaNav video').forEach(e => e.classList.remove('active'));
  if (el.classList) el.classList.add('active');
}

async function openDetail(id) {
  try {
    currentDetail = await API.getCurtain(id);
    const c = currentDetail;
    selectedColorId = null;
    document.getElementById('pageTitle').textContent = c.name;
    document.getElementById('backBtn').style.display = 'inline';

    const medias = c.media || [];
    const mainMedia = document.getElementById('mainMedia');
    if (medias.length > 0) {
      showMainMedia({ tagName: 'IMG', src: medias[0].url, classList: { add: function(){} } });
    } else {
      mainMedia.innerHTML = `<img src="/assets/placeholder.svg" />`;
    }

    const nav = document.getElementById('mediaNav');
    nav.innerHTML = medias.map((m, i) => {
      if (m.type === 'video') {
        return `<video src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}"></video>`;
      }
      return `<img src="${m.url}" onclick="showMainMedia(this)" class="${i === 0 ? 'active' : ''}" onerror="this.src='/assets/placeholder.svg'" />`;
    }).join('');

    document.getElementById('detailName').textContent = c.name;
    const tags = [];
    if (c.category) tags.push(c.category.name);
    if (c.material) tags.push(c.material.name);
    if (c.style) tags.push(c.style.name);
    if (c.light_level) tags.push(c.light_level.name);
    if (c.space) tags.push(c.space.name);
    if (c.size_range) tags.push(c.size_range);
    document.getElementById('detailTags').innerHTML = tags.map(t => `<span>${t}</span>`).join('');

    const colors = c.colors || [];
    document.getElementById('detailColors').innerHTML = colors.map(col =>
      `<div class="color-item" data-color-id="${col.id}" onclick="selectColor(${col.id})"><div class="color-dot" style="background:${col.color_code || '#ddd'}"></div><span>${col.color_name}</span></div>`
    ).join('');

    const isFav = favIds.has(c.id);
    document.getElementById('detailFavText').textContent = isFav ? '已收藏' : '收藏';
    document.getElementById('detailFav').onclick = () => toggleFav(c.id, !isFav);

    currentDetailId = c.id;
    showPage('detail');
  } catch(e) { toast('加载失败'); }
}

let currentDetailId = null;

async function loadFavorites() {
  try {
    const favs = await API.getFavorites();
    favIds = new Set(favs.map(f => f.id));
    renderGrid(document.getElementById('favGrid'), document.getElementById('favEmpty'), favs);
  } catch(e) {}
}

async function toggleFav(id, add) {
  try {
    await API.toggleFavorite(id, add);
    if (add) favIds.add(id); else favIds.delete(id);
    toast(add ? '已收藏' : '已取消收藏');
    if (document.getElementById('page-favorites').classList.contains('hidden') === false) loadFavorites();
    if (document.getElementById('page-detail').classList.contains('hidden') === false) {
      document.getElementById('detailFavText').textContent = add ? '已收藏' : '收藏';
    }
    loadCurtains();
  } catch(e) { toast('操作失败'); }
}

function toggleCompare(id) {
  const idx = compareIds.indexOf(id);
  if (idx > -1) {
    compareIds.splice(idx, 1);
  } else {
    if (compareIds.length >= 4) { toast('最多对比4款'); return; }
    compareIds.push(id);
  }
  localStorage.setItem('compareIds', JSON.stringify(compareIds));
  updateCompareBar();
  loadCurtains();
  if (!document.getElementById('page-compare').classList.contains('hidden')) loadComparePage();
}

function updateCompareBar() {
  const bar = document.getElementById('compareBar');
  if (compareIds.length > 0) {
    bar.style.display = 'flex';
    document.getElementById('compareCount').textContent = compareIds.length + ' 款';
  } else {
    bar.style.display = 'none';
  }
}

async function loadComparePage() {
  if (compareIds.length === 0) {
    document.getElementById('compareGrid').innerHTML = '';
    document.getElementById('compareEmpty').style.display = 'block';
    return;
  }
  document.getElementById('compareEmpty').style.display = 'none';

  const items = [];
  for (const id of compareIds) {
    try {
      const c = await API.getCurtain(id);
      items.push(c);
    } catch(e) {}
  }

  document.getElementById('compareGrid').innerHTML = items.map(c => {
    const cover = (c.media || []).find(m => m.type === 'image');
    return `<div class="compare-item">
      <button class="remove" onclick="toggleCompare(${c.id})">×</button>
      <img src="${cover?.url || '/assets/placeholder.jpg'}" onerror="this.src='/assets/placeholder.jpg'" />
      <div class="info" style="padding:8px">
        <div style="font-weight:600;font-size:13px">${c.name}</div>
        <div style="font-size:12px;color:#999;margin-top:4px">${c.size_range || ''}</div>
        ${c.category ? `<div style="font-size:12px;color:#666">分类：${c.category.name}</div>` : ''}
        ${c.material ? `<div style="font-size:12px;color:#666">材质：${c.material.name}</div>` : ''}
        ${c.style ? `<div style="font-size:12px;color:#666">风格：${c.style.name}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('page-' + name).classList.remove('hidden');
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('pageTitle').textContent = name === 'home' ? '产品展示' : name === 'favorites' ? '收藏' : '对比';
  document.getElementById('backBtn').style.display = name === 'detail' ? 'inline' : 'none';
  document.getElementById('searchBar').style.display = name === 'home' ? 'flex' : 'none';
  document.getElementById('filterBar').style.display = name === 'home' ? 'flex' : 'none';

  if (name === 'home') loadCurtains();
  if (name === 'favorites') loadFavorites();
  if (name === 'compare') loadComparePage();
  return false;
}

document.getElementById('backBtn').onclick = () => {
  if (!document.getElementById('page-detail').classList.contains('hidden')) showPage('home');
};

function toast(msg) {
  let el = document.querySelector('.toast');
  if (!el) {
    el = document.createElement('div'); el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Init
loadCategories();
loadCurtains();
loadFavorites();
updateCompareBar();
</script>
<script>
(function(){
  var active = false, startX, startY, curX, curY, selData = null;
  var panel = null, overlay = null, selBox = null, tooltip = null, btn = null;
  var bar = document.createElement('div');
  bar.id = '__fb_bar';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a73e8;color:#fff;padding:8px 16px;font:14px/1.4 system-ui,sans-serif;display:flex;align-items:center;gap:12px;transform:translateY(-100%);transition:transform .2s;';
  bar.innerHTML = '<span style="font-weight:600;">✧ 反馈模式</span><span id="__fb_status" style="font-size:13px;opacity:.9;">拖拽框选要修改的区域</span><button id="__fb_exit" style="margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px;">退出</button>';
  document.body.appendChild(bar);
  btn = document.createElement('button');
  btn.id = '__fb_btn';
  btn.textContent = '✧ 反馈';
  btn.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:99999;background:#1a73e8;color:#fff;border:none;border-radius:24px;padding:10px 20px;font:14px system-ui,sans-serif;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(26,115,232,.4);';
  document.body.appendChild(btn);
  panel = document.createElement('div');
  panel.id = '__fb_panel';
  panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#fff;border-top:2px solid #1a73e8;padding:16px 20px;box-shadow:0 -4px 20px rgba(0,0,0,.15);font:14px system-ui,sans-serif;display:none;';
  panel.innerHTML =
    '<div style="font-size:12px;color:#888;margin-bottom:8px;"><span id="__fb_info">已选择区域</span><span style="float:right;cursor:pointer;" onclick="this.parentElement.parentElement.style.display=\'none\'">✕</span></div>' +
    '<textarea id="__fb_msg" placeholder="描述你要怎么修改这个区域…" style="width:100%;height:60px;border:1px solid #ccc;border-radius:6px;padding:8px;font-size:13px;resize:vertical;box-sizing:border-box;"></textarea>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">' +
      '<span style="font-size:12px;color:#888;">按 Ctrl+Enter 发送</span>' +
      '<div>' +
        '<button id="__fb_cancel" style="padding:6px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#333;cursor:pointer;margin-right:6px;font-size:13px;">取消</button>' +
        '<button id="__fb_send" style="padding:6px 16px;border:none;border-radius:6px;background:#1a73e8;color:#fff;cursor:pointer;font-size:13px;font-weight:600;">发送反馈</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(panel);
  function startSelector() {
    active = true;
    document.getElementById('__fb_bar').style.transform = 'translateY(0)';
    btn.style.display = 'none';
    overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99998;cursor:crosshair;';
    selBox = document.createElement('div');
    selBox.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;border:2px solid #1a73e8;background:rgba(26,115,232,0.15);display:none;border-radius:2px;';
    tooltip = document.createElement('div');
    tooltip.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;background:#1a73e8;color:#fff;padding:2px 8px;border-radius:4px;font:12px sans-serif;display:none;';
    overlay.appendChild(selBox);
    overlay.appendChild(tooltip);
    var state = {};
    overlay.addEventListener('mousedown', function(e) { state.startX = e.clientX; state.startY = e.clientY; state.active = true; curX = e.clientX; curY = e.clientY; });
    document.addEventListener('mousemove', function(e) {
      if (!state.active) return; curX = e.clientX; curY = e.clientY;
      var l = Math.min(state.startX, curX), t = Math.min(state.startY, curY), w = Math.abs(curX - state.startX), h = Math.abs(curY - state.startY);
      selBox.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;border:2px solid #1a73e8;background:rgba(26,115,232,0.15);left:'+l+'px;top:'+t+'px;width:'+Math.max(w,2)+'px;height:'+Math.max(h,2)+'px;border-radius:2px;display:'+((w>3||h>3)?'block':'none')+';';
      tooltip.textContent = Math.round(w)+' x '+Math.round(h);
      tooltip.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;background:#1a73e8;color:#fff;padding:2px 8px;border-radius:4px;font:12px sans-serif;left:'+(l+w+8)+'px;top:'+t+'px;display:'+((w>3||h>3)?'block':'none')+';';
    });
    document.addEventListener('mouseup', function(e) {
      if (!state.active) return; state.active = false;
      var l = Math.min(state.startX, curX), t = Math.min(state.startY, curY), w = Math.abs(curX - state.startX), h = Math.abs(curY - state.startY);
      if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
      if (w < 5 && h < 5) { document.getElementById('__fb_status').textContent = '框选太小了，再试试'; return; }
      var pts = [{x:l,y:t},{x:l+w,y:t},{x:l,y:t+h},{x:l+w,y:t+h},{x:l+w/2,y:t+h/2},{x:l+w*.25,y:t+h*.25},{x:l+w*.75,y:t+h*.25},{x:l+w*.25,y:t+h*.75},{x:l+w*.75,y:t+h*.75}];
      var seen = {}, els = [];
      pts.forEach(function(pt) {
        if (pt.x<0||pt.y<0||pt.x>window.innerWidth||pt.y>window.innerHeight) return;
        var el = document.elementFromPoint(pt.x, pt.y);
        if (!el || el===document.body||el===document.documentElement||el.id.startsWith('__fb')) return;
        var cur = el;
        while (cur && cur.parentElement && !seen[cur.tagName+'-'+Array.from(cur.classList).join(',')+'-'+(cur.id||'')]) {
          seen[cur.tagName+'-'+Array.from(cur.classList).join(',')+'-'+(cur.id||'')] = 1;
          var cr = cur.getBoundingClientRect();
          if (cr.width===0||cr.height===0) { cur = cur.parentElement; continue; }
          var attrs = {};
          for (var i = 0; i < cur.attributes.length; i++) { var a = cur.attributes[i]; attrs[a.name] = a.value; }
          els.push({ tag: cur.tagName.toLowerCase(), id: cur.id||'', classList: Array.from(cur.classList), textContent: (cur.textContent||'').trim().slice(0,120), attributes: attrs });
          cur = cur.parentElement;
        }
      });
      selData = { rect: {x:l,y:t,width:w,height:h}, elements: els, url: location.href };
      document.getElementById('__fb_bar').style.transform = 'translateY(-100%)';
      document.getElementById('__fb_info').textContent = '已选择 ' + Math.round(w) + 'x' + Math.round(h) + ' 区域，' + els.length + ' 个元素';
      document.getElementById('__fb_panel').style.display = 'block';
      document.getElementById('__fb_msg').focus();
      btn.style.display = '';
      active = false;
    });
    document.body.appendChild(overlay);
  }
  btn.addEventListener('click', startSelector);
  document.getElementById('__fb_exit').addEventListener('click', function() {
    document.getElementById('__fb_bar').style.transform = 'translateY(-100%)'; active = false; btn.style.display = '';
  });
  document.getElementById('__fb_cancel').addEventListener('click', function() { document.getElementById('__fb_panel').style.display = 'none'; });
  document.getElementById('__fb_send').addEventListener('click', function() {
    var msg = document.getElementById('__fb_msg').value.trim();
    if (!msg) { alert('请输入修改描述'); return; }
    if (!selData) { alert('请先框选区域'); return; }
    var fb = JSON.stringify({ action: 'visual-feedback', message: msg, selection: selData });
    navigator.clipboard.writeText(fb).then(function() { alert('反馈已复制到剪贴板'); }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = fb; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      alert('反馈已复制到剪贴板');
    });
    document.getElementById('__fb_panel').style.display = 'none';
    document.getElementById('__fb_msg').value = '';
  });
  document.getElementById('__fb_msg').addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') document.getElementById('__fb_send').click();
  });
})();
</script>
</body>
</html>
