services:
  - type: web
    name: curtain-showcase
    env: node
    buildCommand: npm install
    startCommand: node src/deploy.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: curtain-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: curtain-db
    databaseName: curtain_showcase
    plan: free
